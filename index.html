<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --line-h: 40px;
    --page-l: 72px;
    --page-r: 64px;
    --page-t: 56px;
    --line-color: #E8E7E2;
    --text-main: #1A1A1A;
    --text-sub: #9B9B96;
    --text-heading: #5A5A55;
    --check-border: #BEBEBA;
    --check-done: #C5C5C0;
    --carry-bg: #F5F4F0;
    --carry-text: #9B9B96;
    --max-w: 680px;
    --bar-h: 2px;
  }

  html, body {
    height: 100%;
    background: #fff;
    color: var(--text-main);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: var(--line-h);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== 進捗バー（最上部固定） ===== */
  #progress-bar-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--bar-h);
    background: var(--line-color);
    z-index: 100;
  }
  #progress-bar {
    height: 100%;
    background: var(--text-main);
    transition: width 0.35s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  #progress-bar.complete {
    background: var(--check-border);
  }

  /* 進捗テキスト */
  #progress-label {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--text-sub);
    user-select: none;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  #progress-label.visible { opacity: 1; }

  /* ===== ページ ===== */
  #page {
    min-height: 100vh;
    max-width: var(--max-w);
    margin: 0 auto;
    padding: var(--page-t) var(--page-r) 200px var(--page-l);
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent calc(var(--line-h) - 0.5px),
      var(--line-color) calc(var(--line-h) - 0.5px),
      var(--line-color) var(--line-h)
    );
    background-attachment: local;
    position: relative;
  }

  /* ===== 日付 ===== */
  #date-label {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text-sub);
    font-weight: 400;
    height: var(--line-h);
    display: flex;
    align-items: center;
    user-select: none;
  }

  /* ===== アイテムリスト ===== */
  #items { list-style: none; }

  .item {
    display: flex;
    align-items: center;
    min-height: var(--line-h);
    position: relative;
    gap: 10px;
    transition: opacity 0.15s, background-color 0.15s;
  }
  
  .item.dragging { opacity: 0.3; background-color: #fafafa; }
  .item.drag-over { border-top: 2px solid var(--text-main); }

  /* ドラッグハンドル */
  .drag-handle {
    position: absolute;
    left: -24px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    cursor: grab;
    opacity: 0;
    transition: opacity 0.12s;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2.5px;
    padding: 2px;
    z-index: 10;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle span { display: block; width: 10px; height: 1px; background: var(--check-border); }
  .item:hover .drag-handle { opacity: 1; }

  /* ===== チェックボックス ===== */
  .checkbox {
    flex-shrink: 0;
    width: 15px; height: 15px;
    border: 1.5px solid var(--check-border);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.12s;
    background: transparent;
    appearance: none;
    -webkit-appearance: none;
  }
  .checkbox:hover { border-color: #8E8E89; }
  .checkbox:checked { border-color: var(--check-done); }
  .checkbox:checked::after {
    content: '';
    position: absolute;
    left: 2px; top: 0px;
    width: 8px; height: 5px;
    border-left: 1.5px solid var(--check-done);
    border-bottom: 1.5px solid var(--check-done);
    transform: rotate(-45deg) translateY(1px);
  }

  /* ===== テキスト ===== */
  .item-text {
    flex: 1;
    outline: none; border: none;
    background: transparent;
    font-family: inherit;
    font-size: 15px;
    line-height: var(--line-h);
    color: var(--text-main);
    caret-color: var(--text-main);
    white-space: pre-wrap;
    word-break: break-all;
    min-height: var(--line-h);
    cursor: text;
    resize: none; overflow: hidden;
  }
  .item-text:empty::before {
    content: attr(data-placeholder);
    color: var(--text-sub);
    pointer-events: none;
  }
  .item.done .item-text {
    color: var(--check-done);
    text-decoration: line-through;
    text-decoration-color: #CBCBC6;
  }

  /* 見出し */
  .item.type-heading .item-text {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-heading);
  }
  .item.type-heading .checkbox { display: none; }

  /* メモ */
  .item.type-memo .item-text {
    font-size: 13px; color: var(--text-sub);
    padding-left: 18px;
  }
  .item.type-memo .checkbox { display: none; }
  .item.type-memo::before {
    content: '';
    position: absolute; left: 0; top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 1px;
    background: var(--check-border);
  }

  /* 引き継ぎバッジ */
  .carry-badge {
    flex-shrink: 0;
    font-size: 10px; letter-spacing: 0.04em;
    color: var(--carry-text); background: var(--carry-bg);
    border-radius: 3px; padding: 1px 6px;
    line-height: 18px; font-weight: 400;
    user-select: none;
  }

  /* ===== 入力行 ===== */
  #new-input {
    display: flex; align-items: center;
    min-height: var(--line-h); gap: 10px; cursor: text;
  }
  #new-input-field {
    flex: 1; outline: none; border: none;
    background: transparent; font-family: inherit;
    font-size: 15px; line-height: var(--line-h);
    color: var(--text-main); caret-color: var(--text-main);
  }
  .input-checkbox-ghost {
    flex-shrink: 0; width: 15px; height: 15px;
    border: 1.5px solid var(--line-color); border-radius: 3px;
    pointer-events: none;
  }

  /* ===== ブランド + メニューボタン ===== */
  #topbar {
    position: fixed;
    top: 16px; right: 24px;
    display: flex; align-items: center; gap: 16px;
    z-index: 200;
  }
  #brand {
    font-size: 12px; letter-spacing: 0.12em;
    color: var(--line-color); font-weight: 400;
    user-select: none; transition: color 0.3s; cursor: default;
  }
  #brand:hover { color: var(--text-sub); }

  #menu-btn {
    background: none; border: none; cursor: pointer;
    padding: 4px; display: flex; flex-direction: column;
    gap: 3px; opacity: 0.3; transition: opacity 0.2s;
  }
  #menu-btn:hover { opacity: 0.7; }
  #menu-btn span { display: block; width: 14px; height: 1px; background: var(--text-main); }

  /* ===== ドロワーメニュー ===== */
  #drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 260px;
    background: #fff;
    border-left: 0.5px solid var(--line-color);
    z-index: 300;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    padding: 56px 28px 32px;
    gap: 0;
  }
  #drawer.open { transform: translateX(0); }

  #drawer-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.04);
    z-index: 299;
    display: none;
  }
  #drawer-overlay.open { display: block; }

  #drawer-close {
    position: absolute; top: 18px; right: 20px;
    background: none; border: none; cursor: pointer;
    font-size: 18px; color: var(--text-sub);
    line-height: 1; padding: 4px;
  }
  #drawer-close:hover { color: var(--text-main); }

  .drawer-section {
    padding: 20px 0;
    border-bottom: 0.5px solid var(--line-color);
  }
  .drawer-section:last-child { border-bottom: none; }

  .drawer-label {
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-sub);
    margin-bottom: 14px; font-weight: 500;
  }

  .drawer-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; background: none; border: none;
    cursor: pointer; padding: 8px 0;
    font-family: inherit; font-size: 13px;
    color: var(--text-main); text-align: left;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .drawer-btn:hover { color: var(--text-heading); }
  .drawer-btn svg { flex-shrink: 0; opacity: 0.5; }

  #import-input { display: none; }

  /* ===== ヒント ===== */
  #hint {
    position: fixed; bottom: 24px; right: 28px;
    font-size: 11px; color: var(--text-sub);
    letter-spacing: 0.04em; line-height: 1.8;
    text-align: right; pointer-events: none;
    opacity: 0; transition: opacity 0.4s; user-select: none;
  }
  #hint.visible { opacity: 1; }
  #hint kbd {
    font-family: inherit; font-size: 10px;
    background: #F0EFE9; border-radius: 3px;
    padding: 1px 5px; color: var(--text-heading);
  }

  /* ===== トースト ===== */
  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--text-main); color: #fff;
    font-size: 12px; letter-spacing: 0.03em;
    padding: 7px 16px; border-radius: 20px;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    :root { --page-l: 40px; --page-r: 24px; --page-t: 44px; }
    #hint { display: none; }
    #drawer { width: 240px; }
  }
</style>
</head>
<body>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>
<div id="progress-label"></div>

<div id="topbar">
  <span id="brand">jot</span>
  <button id="menu-btn" title="メニュー" aria-label="メニューを開く">
    <span></span><span></span><span></span>
  </button>
</div>

<div id="drawer-overlay"></div>
<div id="drawer" role="dialog" aria-label="メニュー">
  <button id="drawer-close" aria-label="閉じる">✕</button>

  <div class="drawer-section">
    <div class="drawer-label">データ</div>
    <button class="drawer-btn" id="btn-export-json">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      エクスポート（JSON）
    </button>
    <button class="drawer-btn" id="btn-export-txt">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      エクスポート（テキスト）
    </button>
    <button class="drawer-btn" id="btn-import">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      インポート（JSON）
    </button>
    <input type="file" id="import-input" accept=".json">
  </div>

  <div class="drawer-section">
    <div class="drawer-label">ショートカット</div>
    <div style="font-size:12px; color:var(--text-sub); line-height:2;">
      <kbd style="font-family:inherit;font-size:10px;background:#F0EFE9;border-radius:3px;padding:1px 5px;color:var(--text-heading)">Enter</kbd> タスクを追加<br>
      <kbd style="font-family:inherit;font-size:10px;background:#F0EFE9;border-radius:3px;padding:1px 5px;color:var(--text-heading)">Shift+Enter</kbd> 改行<br>
      <kbd style="font-family:inherit;font-size:10px;background:#F0EFE9;border-radius:3px;padding:1px 5px;color:var(--text-heading)">#</kbd> 見出し <kbd style="font-family:inherit;font-size:10px;background:#F0EFE9;border-radius:3px;padding:1px 5px;color:var(--text-heading)">-</kbd> メモ<br>
      <kbd style="font-family:inherit;font-size:10px;background:#F0EFE9;border-radius:3px;padding:1px 5px;color:var(--text-heading)">Backspace</kbd> 空行で前を編集<br>
      <kbd style="font-family:inherit;font-size:10px;background:#F0EFE9;border-radius:3px;padding:1px 5px;color:var(--text-heading)">Drag</kbd> 並び替え
    </div>
  </div>
</div>

<div id="page">
  <div id="date-label"></div>
  <ul id="items"></ul>
  <div id="new-input">
    <div class="input-checkbox-ghost"></div>
    <input id="new-input-field" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="書く...">
  </div>
</div>

<div id="hint">
  <kbd>#</kbd> 見出し &nbsp; <kbd>-</kbd> メモ<br>
  <kbd>Shift+Enter</kbd> 改行 &nbsp; <kbd>Drag</kbd> 並び替え
</div>
<div id="toast"></div>

<script>
// ===== ストレージ =====
const DB_KEY = 'jot_pages';

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function loadAll() {
  try { return JSON.parse(localStorage.getItem(DB_KEY) || '{}'); } catch { return {}; }
}
function saveAll(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); }
function loadPage(key) { const a = loadAll(); return a[key] || { items: [] }; }
function savePage(key, pg) { const a = loadAll(); a[key] = pg; saveAll(a); }
function uid() { return Math.random().toString(36).slice(2,10); }

// ===== 💻 クラシック・タイプライター音響合成エンジン =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function createHeavyNoise() {
  const bufferSize = audioCtx.sampleRate * 0.4; 
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
  return buffer;
}
const noiseBuffer = createHeavyNoise();

// キー配列による音の左右定位マッピング
const surfaceKeyPanMap = {
  '1':-0.84, '2':-0.71, '3':-0.58, '4':-0.45, '5':-0.32, '6':-0.19, '7':-0.06, '8':0.07, '9':0.20, '0':0.33, '-':0.46, '^':0.59, '¥':0.72, 'Backspace':0.90,
  'q':-0.80, 'w':-0.67, 'e':-0.54, 'r':-0.41, 't':-0.28, 'y':-0.15, 'u':-0.02, 'i':0.11, 'o':0.24, 'p':0.37, '@':0.50, '[':0.63, 'Enter':0.88,
  'a':-0.76, 's':-0.63, 'd':-0.50, 'f':-0.37, 'g':-0.24, 'h':-0.11, 'j':0.02, 'k':0.15, 'l':0.28, ';':0.41, ':':0.54, ']':0.67,
  'z':-0.70, 'x':-0.57, 'c':-0.44, 'v':-0.31, 'b':-0.18, 'n':-0.05, 'm':0.08, ',':0.21, '.':0.34, '/':0.47, '_':0.60,
  ' ': 0.00
};

function getSurfacePan(key) {
  if (!key) return 0;
  if (surfaceKeyPanMap[key] !== undefined) return surfaceKeyPanMap[key];
  const upper = key.toUpperCase();
  if (surfaceKeyPanMap[upper] !== undefined) return surfaceKeyPanMap[upper];
  return (Math.random() * 2 - 1) * 0.2;
}

function unlockAudio() {
  if (audioCtx.state === 'suspended') { audioCtx.resume(); }
}
window.addEventListener('click', unlockAudio);
window.addEventListener('touchstart', unlockAudio);
window.addEventListener('keydown', unlockAudio);

function playSurfaceSound(type, keyName = '') {
  unlockAudio();
  const now = audioCtx.currentTime;

  const panner = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
  const targetPan = (type === 'space') ? 0.0 : (type === 'check' ? -0.65 : getSurfacePan(keyName));
  
  if (panner) { panner.pan.setValueAtTime(targetPan, now); }

  // アナログ筐体の低音共振と高域特性をシミュレート
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(type === 'add' ? 1200 : 900 + (Math.random() * 300), now);
  filter.Q.setValueAtTime(type === 'add' ? 0.8 : 2.5, now);

  if (panner) { filter.connect(panner); panner.connect(audioCtx.destination); }
  else { filter.connect(audioCtx.destination); }

  // 新・メカニカル物理音響合成ロジック
  function synthMechanicalClick(baseFreq, volume, noiseMix, duration, typePattern) {
    const jitter = (Math.random() * 2 - 1) * 40;
    const freq = baseFreq + jitter;
    const dynVol = volume * (0.8 + Math.random() * 0.4);

    // 1. 金属アームがリボン・紙を叩くインパクト音 (強い高周波アタック)
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.type = 'triangle';
    osc1.frequency.setValueAtTime(freq * 1.8, now);
    osc1.frequency.exponentialRampToValueAtTime(freq * 0.5, now + duration);
    gain1.gain.setValueAtTime(dynVol, now);
    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.015);

    // 2. 内部レバーのガチャリという金属反響音
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(freq * 0.8, now);
    gain2.gain.setValueAtTime(dynVol * 0.4, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + duration);

    // 3. 原紙を鋭く打つ高摩擦の破裂ノイズ
    const noise = audioCtx.createBufferSource();
    const noiseGain = audioCtx.createGain();
    noise.buffer = noiseBuffer;
    noiseGain.gain.setValueAtTime(dynVol * noiseMix, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.7);

    osc1.connect(gain1); gain1.connect(filter);
    osc2.connect(gain2); gain2.connect(filter);
    noise.connect(noiseGain); noiseGain.connect(filter);

    osc1.start(now); osc1.stop(now + duration + 0.02);
    osc2.start(now); osc2.stop(now + duration + 0.02);
    noise.start(now); noise.stop(now + duration + 0.02);
  }

  switch (type) {
    case 'type': // パチン！と快快に響くキー打鍵
      synthMechanicalClick(320, 0.45, 3.8, 0.06, 'key');
      break;
    case 'space': // トンッ！と少し太く抜けるスペースバー
      synthMechanicalClick(180, 0.55, 2.5, 0.10, 'space');
      break;
    case 'add': // チンッ！ガラガラ…という爽快なキャリッジリターン（改行）
      // ① ベルの「チンッ！」音
      const bellOsc = audioCtx.createOscillator();
      const bellGain = audioCtx.createGain();
      bellOsc.type = 'sine';
      bellOsc.frequency.setValueAtTime(2100, now); // 高いベルの金属音
      bellGain.gain.setValueAtTime(0.35, now);
      bellGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      bellOsc.connect(bellGain); bellGain.connect(audioCtx.destination);
      bellOsc.start(now); bellOsc.stop(now + 0.2);

      // ② 紙送り台が滑る「ガシャッ」音
      synthMechanicalClick(140, 0.60, 4.5, 0.18, 'return');
      break;
    case 'delete': // ガチャッという少し重たいバックスペース音
      synthMechanicalClick(220, 0.40, 3.0, 0.08, 'delete');
      break;
    case 'check': // カチリと決まるラッチ・トグルスイッチ音
      synthMechanicalClick(480, 0.42, 1.5, 0.05, 'check');
      break;
  }
}

// ===== 引き継ぎ =====
function maybeCarryOver(todayKey) {
  const all = loadAll();
  const keys = Object.keys(all).sort();
  const prevKey = keys.filter(k => k < todayKey).pop();
  if (!prevKey) return;
  const prev = all[prevKey];
  const today = all[todayKey] || { items: [] };
  if (today.carriedOver) return;
  const undone = (prev.items || []).filter(it => it.type === 'task' && !it.checked);
  today.carriedOver = true;
  if (undone.length > 0) {
    const carried = undone.map(it => ({ ...it, id: uid(), carriedFrom: prevKey, checked: false }));
    today.items = [...carried, ...(today.items || [])];
  }
  savePage(todayKey, today);
}

// ===== 進捗バー =====
function updateProgress() {
  const tasks = page.items.filter(it => it.type === 'task');
  const done  = tasks.filter(it => it.checked).length;
  const total = tasks.length;
  const bar   = document.getElementById('progress-bar');
  const label = document.getElementById('progress-label');
  if (total === 0) {
    bar.style.width = '0%';
    bar.classList.remove('complete');
    label.classList.remove('visible');
    return;
  }
  const pct = Math.round(done / total * 100);
  bar.style.width = pct + '%';
  bar.classList.toggle('complete', pct === 100);
  label.textContent = `${done} / ${total}`;
  label.classList.add('visible');
  clearTimeout(label._timer);
  label._timer = setTimeout(() => label.classList.remove('visible'), 2400);
}

// ===== 記法 =====
function getItemType(text) {
  if (text.startsWith('# ') || text === '#') return 'heading';
  if (text.startsWith('- ') || text === '-') return 'memo';
  return 'task';
}
function getDisplayText(text, type) {
  if (type === 'heading') return text.replace(/^#\s*/, '');
  if (type === 'memo')    return text.replace(/^-\s*/, '');
  return text;
}
function getRawText(display, type) {
  if (type === 'heading') return '# ' + display;
  if (type === 'memo')    return '- ' + display;
  return display;
}

// ===== 初期化 =====
const todayKey = getTodayKey();
document.getElementById('date-label').textContent = todayKey;
maybeCarryOver(todayKey);
let page = loadPage(todayKey);

// ===== レンダリング =====
function renderItems() {
  const ul = document.getElementById('items');
  ul.innerHTML = '';
  page.items.forEach((item, idx) => {
    const li = document.createElement('li');
    li.className = 'item'
      + (item.type === 'heading' ? ' type-heading' : item.type === 'memo' ? ' type-memo' : '')
      + (item.checked ? ' done' : '');
    li.dataset.idx = idx;

    // ハンドル
    const handle = document.createElement('div');
    handle.className = 'drag-handle';
    handle.innerHTML = '<span></span><span></span><span></span>';
    li.appendChild(handle);

    // チェックボックス
    if (item.type === 'task') {
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'checkbox'; cb.checked = item.checked;
      cb.addEventListener('change', () => {
        playSurfaceSound('check');
        page.items[idx].checked = cb.checked;
        savePage(todayKey, page);
        li.classList.toggle('done', cb.checked);
        updateProgress();
      });
      li.appendChild(cb);
    }

    // テキスト
    const span = document.createElement('div');
    span.className = 'item-text';
    span.contentEditable = 'true';
    span.spellcheck = false;
    span.textContent = getDisplayText(item.text, item.type);
    span.addEventListener('input', () => {
      page.items[idx].text = getRawText(span.textContent, item.type);
      savePage(todayKey, page);
    });
    
    span.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault(); 
        focusNewInput();
      } else if (e.key === 'Backspace') {
        if (span.textContent === '') {
          e.preventDefault();
          playSurfaceSound('delete', 'Backspace');
          page.items.splice(idx, 1);
          savePage(todayKey, page);
          renderItems(); 
          updateProgress();
          const els = document.querySelectorAll('.item-text');
          if (els.length > 0) {
            const t = els[Math.max(0, idx-1)]; t.focus();
            const r = document.createRange(); const s = window.getSelection();
            r.selectNodeContents(t); r.collapse(false);
            s.removeAllRanges(); s.addRange(r);
          } else { focusNewInput(); }
        } else {
          playSurfaceSound('delete', 'Backspace');
        }
      } else if (!e.key.startsWith('Arrow') && !e.ctrlKey && !e.metaKey) {
        if (e.key === ' ') {
          playSurfaceSound('space', ' ');
        } else {
          playSurfaceSound('type', e.key);
        }
      }
    });
    li.appendChild(span);

    // 引き継ぎバッジ
    if (item.carriedFrom) {
      const b = document.createElement('span');
      b.className = 'carry-badge'; b.textContent = '引き継ぎ';
      li.appendChild(b);
    }

    // ドラッグ＆ドロップ並び替えシステム
    li.draggable = true;
    
    li.addEventListener('dragstart', e => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(idx));
      setTimeout(() => li.classList.add('dragging'), 0);
    });
    
    li.addEventListener('dragend', () => {
      li.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    });
    
    li.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (!li.classList.contains('dragging')) {
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        li.classList.add('drag-over');
      }
    });

    li.addEventListener('dragleave', () => {
      li.classList.remove('drag-over');
    });
    
    li.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      
      const fromIndexStr = e.dataTransfer.getData('text/plain');
      if (fromIndexStr === '') return;
      
      const from = parseInt(fromIndexStr, 10);
      if (isNaN(from) || from === idx) return;
      
      const moved = page.items.splice(from, 1)[0];
      page.items.splice(idx, 0, moved);
      
      savePage(todayKey, page); 
      renderItems(); 
      updateProgress();
    });

    ul.appendChild(li);
  });
  updateProgress();
}

// ===== 入力欄 =====
const newInput = document.getElementById('new-input-field');

function focusNewInput() {
  newInput.focus();
  setTimeout(() => newInput.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

newInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const raw = newInput.value.trim();
    if (!raw) return;
    page.items.push({ id: uid(), type: getItemType(raw), text: raw, checked: false });
    savePage(todayKey, page);
    newInput.value = '';
    renderItems();
    playSurfaceSound('add', 'Enter');
  } else if (e.key === 'Backspace') {
    if (newInput.value === '' && page.items.length > 0) {
      e.preventDefault();
      playSurfaceSound('delete', 'Backspace');
      const els = document.querySelectorAll('.item-text');
      if (els.length > 0) {
        const last = els[els.length-1]; last.focus();
        const r = document.createRange(); const s = window.getSelection();
        r.selectNodeContents(last); r.collapse(false);
        s.removeAllRanges(); s.addRange(r);
      }
    } else {
      playSurfaceSound('delete', 'Backspace');
    }
  } else if (!e.key.startsWith('Arrow') && !e.ctrlKey && !e.metaKey) {
    if (e.key === ' ') {
      playSurfaceSound('space', ' ');
    } else {
      playSurfaceSound('type', e.key);
    }
  }
});

let hintShown = false;
newInput.addEventListener('input', () => {
  if (!hintShown && newInput.value.length > 0) {
    hintShown = true;
    document.getElementById('hint').classList.add('visible');
    setTimeout(() => document.getElementById('hint').classList.remove('visible'), 4000);
  }
});

document.getElementById('page').addEventListener('click', e => {
  if (e.target === document.getElementById('page') ||
      e.target === document.getElementById('items') ||
      e.target === document.getElementById('new-input')) {
    focusNewInput();
  }
});

// ===== トースト =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ===== ドロワー =====
function openDrawer()  {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

document.getElementById('menu-btn').addEventListener('click', openDrawer);
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);

// ===== ダウンロードヘルパー =====
function downloadText(filename, content, mime) {
  const blob = new Blob([content], { type: mime + ';charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(function() { URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
}

// ===== エクスポート（JSON） =====
document.getElementById('btn-export-json').addEventListener('click', () => {
  closeDrawer();
  setTimeout(() => {
    const all = loadAll();
    const json = JSON.stringify(all, null, 2);
    const today = getTodayKey().replace(/\./g, '');
    downloadText('jot_backup_' + today + '.json', json, 'application/json');
    showToast('JSONをエクスポートしました');
  }, 300);
});

// ===== エクスポート（テキスト） =====
document.getElementById('btn-export-txt').addEventListener('click', () => {
  closeDrawer();
  setTimeout(() => {
    const all = loadAll();
    const keys = Object.keys(all).sort().reverse();
    let text = '';
    keys.forEach(key => {
      const pg = all[key];
      text += '===== ' + key + ' =====\n';
      (pg.items || []).forEach(it => {
        if (it.type === 'heading') text += '\n' + it.text.replace(/^#\s*/, '').toUpperCase() + '\n';
        else if (it.type === 'memo') text += '  ' + it.text.replace(/^-\s*/, '') + '\n';
        else text += (it.checked ? '☑' : '□') + ' ' + it.text + '\n';
      });
      text += '\n';
    });
    const today = getTodayKey().replace(/\./g, '');
    downloadText('jot_' + today + '.txt', text, 'text/plain');
    showToast('テキストをエクスポートしました');
  }, 300);
});

// ===== インポート（JSON） =====
document.getElementById('btn-import').addEventListener('click', () => {
  closeDrawer();
  setTimeout(() => {
    document.getElementById('import-input').click();
  }, 300);
});

document.getElementById('import-input').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (typeof data !== 'object' || Array.isArray(data) || data === null) {
        throw new Error('invalid format');
      }
      const validKeys = Object.keys(data).filter(k => /^\d{4}\.\d{2}\.\d{2}$/.test(k));
      if (validKeys.length === 0) throw new Error('no valid date keys');
      const existing = loadAll();
      const merged = Object.assign({}, existing, data);
      saveAll(merged);
      page = loadPage(todayKey);
      renderItems();
      showToast('インポート完了 — ' + validKeys.length + ' 日分');
    } catch(err) {
      showToast('読み込み失敗：正しいJotのJSONファイルか確認してください');
    }
    this.value = '';
  };
  reader.readAsText(file);
});

// ===== 0時リロード =====
function scheduleNextDay() {
  const now = new Date();
  const next = new Date(now);
  next.setDate(next.getDate() + 1); next.setHours(0, 0, 1, 0);
  setTimeout(() => location.reload(), next - now);
}

// ===== 起動 =====
renderItems();
focusNewInput();
scheduleNextDay();

if (page.items.some(it => it.carriedFrom)) {
  const n = page.items.filter(it => it.carriedFrom).length;
  setTimeout(() => showToast(`昨日の未完了を ${n} 件引き継ぎました`), 600);
}
</script>
