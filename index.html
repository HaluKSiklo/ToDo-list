<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --line-h: 40px;
    --page-l: 72px;
    --page-r: 64px;
    --page-t: 56px;
    --line-color: #E8E7E2;
    --text-main: #1A1A1A;
    --text-sub: #9B9B96;
    --text-heading: #5A5A55;
    --check-border: #BEBEBA;
    --check-done: #C5C5C0;
    --carry-bg: #F5F4F0;
    --carry-text: #9B9B96;
    --max-w: 680px;
    --bar-h: 2px;
    --bg-main: #ffffff;
    --kbd-bg: #F0EFE9;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --line-color: #2C2C2A;
      --text-main: #E3E3E1;
      --text-sub: #70706B;
      --text-heading: #A1A19B;
      --check-border: #4A4A47;
      --check-done: #5A5A56;
      --carry-bg: #222220;
      --carry-text: #70706B;
      --bg-main: #141413;
      --kbd-bg: #2C2C2A;
    }
  }

  html, body {
    height: 100%;
    background: var(--bg-main);
    color: var(--text-main);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: var(--line-h);
    -webkit-font-smoothing: antialiased;
    transition: background 0.3s, color 0.3s;
  }

  #progress-bar-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--bar-h);
    background: var(--line-color);
    z-index: 100;
  }
  #progress-bar {
    height: 100%;
    background: var(--text-main);
    transition: width 0.35s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  #progress-bar.complete {
    background: var(--check-border);
  }

  #progress-label {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--text-sub);
    user-select: none;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  #progress-label.visible { opacity: 1; }

  #page {
    min-height: 100vh;
    max-width: var(--max-w);
    margin: 0 auto;
    padding: var(--page-t) var(--page-r) 200px var(--page-l);
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent calc(var(--line-h) - 0.5px),
      var(--line-color) calc(var(--line-h) - 0.5px),
      var(--line-color) var(--line-h)
    );
    background-attachment: local;
    position: relative;
  }

  #date-container {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: var(--line-h);
    user-select: none;
    z-index: 10;
  }
  #date-label {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text-sub);
    font-weight: 400;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.2s, color 0.2s;
  }
  #date-label:hover {
    background: var(--carry-bg);
    color: var(--text-main);
  }
  
  .date-nav-btn {
    background: none; border: none; color: var(--text-sub);
    font-size: 10px; cursor: pointer; padding: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s;
  }
  .date-nav-btn:hover { color: var(--text-main); }

  #calendar-picker {
    position: absolute; top: 36px; left: 0;
    background: var(--bg-main);
    border: 1px solid var(--line-color);
    border-radius: 6px; padding: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    display: none; width: 220px; z-index: 50;
  }
  #calendar-picker.open { display: block; }
  .cal-header {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; font-weight: 500; color: var(--text-heading); margin-bottom: 8px;
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 10px; }
  .cal-day-label { color: var(--text-sub); font-weight: 500; padding-bottom: 4px; }
  .cal-cell {
    padding: 4px 0; border-radius: 4px; cursor: pointer; color: var(--text-main);
    transition: background 0.15s;
  }
  .cal-cell:hover { background: var(--line-color); }
  .cal-cell.has-data { font-weight: 500; text-decoration: underline; text-decoration-color: var(--text-sub); }
  .cal-cell.current { background: var(--text-main); color: var(--bg-main); font-weight: 500; }

  #paper-lines { list-style: none; }

  .paper-line {
    display: flex;
    align-items: center;
    min-height: var(--line-h);
    position: relative;
    gap: 10px;
    transition: opacity 0.15s, background-color 0.15s;
  }
  
  /* 紙を浮かせてちぎるような手触り */
  .paper-line.weightless { opacity: 0.3; background-color: var(--carry-bg); }
  .paper-line.crease { border-top: 2px solid var(--text-main); }

  .drag-handle {
    position: absolute;
    left: -24px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    cursor: grab;
    opacity: 0;
    transition: opacity 0.12s;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2.5px;
    padding: 2px;
    z-index: 10;
    touch-action: none;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle span { display: block; width: 10px; height: 1px; background: var(--check-border); }
  .paper-line:hover .drag-handle { opacity: 1; }

  .checkbox {
    flex-shrink: 0;
    width: 15px; height: 15px;
    border: 1.5px solid var(--check-border);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.12s;
    background: transparent;
    appearance: none;
    -webkit-appearance: none;
  }
  .checkbox:hover { border-color: var(--text-heading); }
  .checkbox:checked { border-color: var(--check-done); }
  .checkbox:checked::after {
    content: '';
    position: absolute;
    left: 2px; top: 0px;
    width: 8px; height: 5px;
    border-left: 1.5px solid var(--check-done);
    border-bottom: 1.5px solid var(--check-done);
    transform: rotate(-45deg) translateY(1px);
  }

  .line-ink {
    flex: 1;
    outline: none; border: none;
    background: transparent;
    font-family: inherit;
    font-size: 15px;
    line-height: var(--line-h);
    color: var(--text-main);
    caret-color: var(--text-main);
    white-space: pre-wrap;
    word-break: break-all;
    min-height: var(--line-h);
    cursor: text;
    resize: none; overflow: hidden;
  }
  .line-ink:empty::before {
    content: attr(data-placeholder);
    color: var(--text-sub);
    pointer-events: none;
  }
  .paper-line.done .line-ink {
    color: var(--check-done);
    text-decoration: line-through;
    text-decoration-color: var(--check-done);
  }

  .paper-line.type-heading .line-ink {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-heading);
  }
  .paper-line.type-heading .checkbox { display: none; }

  .paper-line.type-memo .line-ink {
    font-size: 13px; color: var(--text-sub);
    padding-left: 18px;
  }
  .paper-line.type-memo .checkbox { display: none; }
  .paper-line.type-memo::before {
    content: '';
    position: absolute; left: 0; top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 1px;
    background: var(--check-border);
  }

  .carry-badge {
    flex-shrink: 0;
    font-size: 10px; letter-spacing: 0.04em;
    color: var(--carry-text); background: var(--carry-bg);
    border-radius: 3px; padding: 1px 6px;
    line-height: 18px; font-weight: 400;
    user-select: none;
  }

  #feed-line {
    display: flex; align-items: center;
    min-height: var(--line-h); gap: 10px; cursor: text;
  }
  #feed-well {
    flex: 1; outline: none; border: none;
    background: transparent; font-family: inherit;
    font-size: 15px; line-height: var(--line-h);
    color: var(--text-main); caret-color: var(--text-main);
  }
  .input-checkbox-ghost {
    flex-shrink: 0; width: 15px; height: 15px;
    border: 1.5px solid var(--line-color); border-radius: 3px;
    pointer-events: none;
  }

  #topbar {
    position: fixed;
    top: 16px; right: 24px;
    display: flex; align-items: center; gap: 16px;
    z-index: 200;
  }
  #brand {
    font-size: 12px; letter-spacing: 0.12em;
    color: var(--line-color); font-weight: 400;
    user-select: none; transition: color 0.3s; cursor: default;
  }
  #brand:hover { color: var(--text-sub); }

  #menu-btn {
    background: none; border: none; cursor: pointer;
    padding: 4px; display: flex; flex-direction: column;
    gap: 3px; opacity: 0.3; transition: opacity 0.2s;
  }
  #menu-btn:hover { opacity: 0.7; }
  #menu-btn span { display: block; width: 14px; height: 1px; background: var(--text-main); }

  #drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 260px;
    background: var(--bg-main);
    border-left: 0.5px solid var(--line-color);
    z-index: 300;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    padding: 56px 28px 32px;
    gap: 0;
  }
  #drawer.open { transform: translateX(0); }

  #drawer-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.04);
    z-index: 299;
    display: none;
  }
  #drawer-overlay.open { display: block; }

  #drawer-close {
    position: absolute; top: 18px; right: 20px;
    background: none; border: none; cursor: pointer;
    font-size: 18px; color: var(--text-sub);
    line-height: 1; padding: 4px;
  }
  #drawer-close:hover { color: var(--text-main); }

  .drawer-section {
    padding: 20px 0;
    border-bottom: 0.5px solid var(--line-color);
  }
  .drawer-section:last-child { border-bottom: none; }

  .drawer-label {
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-sub);
    margin-bottom: 14px; font-weight: 500;
  }

  .drawer-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; background: none; border: none;
    cursor: pointer; padding: 8px 0;
    font-family: inherit; font-size: 13px;
    color: var(--text-main); text-align: left;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .drawer-btn:hover { color: var(--text-heading); }
  .drawer-btn svg { flex-shrink: 0; opacity: 0.5; }

  #import-input { display: none; }

  #hint {
    position: fixed; bottom: 24px; right: 28px;
    font-size: 11px; color: var(--text-sub);
    letter-spacing: 0.04em; line-height: 1.8;
    text-align: right; pointer-events: none;
    opacity: 0; transition: opacity 0.4s; user-select: none;
  }
  #hint.visible { opacity: 1; }
  #hint kbd {
    font-family: inherit; font-size: 10px;
    background: var(--kbd-bg); border-radius: 3px;
    padding: 1px 5px; color: var(--text-heading);
  }

  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--text-main); color: var(--bg-main);
    font-size: 12px; letter-spacing: 0.03em;
    padding: 8px 18px; border-radius: 20px;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    z-index: 500; white-space: nowrap;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast-undo-btn {
    background: none; border: none; color: var(--text-sub); font-family: inherit;
    font-size: 11px; font-weight: 500; cursor: pointer; text-decoration: underline; padding: 2px 4px;
  }
  #toast-undo-btn:hover { color: var(--text-main); }
  @media (prefers-color-scheme: dark) {
    #toast-undo-btn:hover { color: var(--bg-main); }
  }

  @media (max-width: 600px) {
    :root { --page-l: 40px; --page-r: 24px; --page-t: 44px; }
    #hint { display: none; }
    #drawer { width: 240px; }
  }
</style>
</head>
<body>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>
<div id="progress-label"></div>

<div id="topbar">
  <span id="brand">jot</span>
  <button id="menu-btn" title="メニュー" aria-label="メニューを開く">
    <span></span><span></span><span></span>
  </button>
</div>

<!-- ドロワー -->
<div id="drawer-overlay"></div>
<div id="drawer" role="dialog" aria-label="メニュー">
  <button id="drawer-close" aria-label="閉じる">✕</button>

  <div class="drawer-section">
    <div class="drawer-label">データ</div>
    <button class="drawer-btn" id="btn-export-json">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      エクスポート（JSON）
    </button>
    <button class="drawer-btn" id="btn-export-txt">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      エクスポート（テキスト）
    </button>
    <button class="drawer-btn" id="btn-import">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      インポート（JSON）
    </button>
    <input type="file" id="import-input" accept=".json">
  </div>

  <div class="drawer-section">
    <div class="drawer-label">ショートカット</div>
    <div style="font-size:12px; color:var(--text-sub); line-height:2;">
      <kbd>Enter</kbd> タスクを追加 / 下の行へ<br>
      <kbd>↑</kbd> <kbd>↓</kbd> 行間のフォーカス移動<br>
      <kbd>Ctrl+Shift+↑</kbd> <kbd>↓</kbd> 行の並び替え<br>
      <kbd>Ctrl+E</kbd> タスクの完了切り替え<br>
      <kbd>Ctrl+Z</kbd> 削除を元に戻す<br>
      <kbd>#</kbd> 見出し / <kbd>-</kbd> メモ (先頭入力)
    </div>
  </div>
</div>

<div id="page">
  <div id="date-container">
    <button class="date-nav-btn" id="btn-prev-day">◀</button>
    <div id="date-label"></div>
    <button class="date-nav-btn" id="btn-next-day">▶</button>
    <!-- カレンダーポップアップ -->
    <div id="calendar-picker">
      <div class="cal-header">
        <button id="cal-prev-month" style="background:none;border:none;cursor:pointer;color:inherit;">◀</button>
        <span id="cal-month-title"></span>
        <button id="cal-next-month" style="background:none;border:none;cursor:pointer;color:inherit;">▶</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <ul id="paper-lines"></ul>
  <div id="feed-line">
    <div class="input-checkbox-ghost"></div>
    <input id="feed-well" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="書く...">
  </div>
</div>

<div id="hint">
  <kbd>#</kbd> 見出し &nbsp; <kbd>-</kbd> メモ &nbsp; <kbd>↑↓</kbd> 移動 &nbsp; <kbd>Ctrl+Z</kbd> Undo
</div>
<div id="toast">
  <span id="toast-text"></span>
  <button id="toast-undo-btn">元に戻す</button>
</div>

<script>
// ローカル環境との対話経路
const ARCHIVE_BOX = 'jot_pages';
let activeDate = getTodayKey();
let scroll = { glyphs: [] };
let scrapPaper = null; // 誤って引きちぎった行の救出バッファ

function formatDateKey(date) {
  return `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`;
}
function getTodayKey() { return formatDateKey(new Date()); }
function uncoverArchive() { try { return JSON.parse(localStorage.getItem(ARCHIVE_BOX) || '{}'); } catch { return {}; } }
function sealArchive(data) { localStorage.setItem(ARCHIVE_BOX, JSON.stringify(data)); }
function readScroll(key) { const a = uncoverArchive(); return a[key] || { glyphs: [] }; }
function writeScroll(key, sc) { const a = uncoverArchive(); a[key] = sc; sealArchive(a); }
function uid() { return Math.random().toString(36).slice(2,10); }

// どうしてもBraveやiOSが音を眠らせたがるから、強引に叩き起こすおまじない
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function createHeavyNoise() {
  const bufferSize = audioCtx.sampleRate * 0.4; 
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
  return buffer;
}
const noiseBuffer = createHeavyNoise();

// Surface Type Cover の物理キートップ位置比率。ミリ単位の実測値をそのままブチ込んだ
const surfaceKeyPanMap = {
  '1':-0.84, '2':-0.71, '3':-0.58, '4':-0.45, '5':-0.32, '6':-0.19, '7':-0.06, '8':0.07, '9':0.20, '0':0.33, '-':0.46, '^':0.59, '¥':0.72, 'Backspace':0.90,
  'q':-0.80, 'w':-0.67, 'e':-0.54, 'r':-0.41, 't':-0.28, 'y':-0.15, 'u':-0.02, 'i':0.11, 'o':0.24, 'p':0.37, '@':0.50, '[':0.63, 'Enter':0.88,
  'a':-0.76, 's':-0.63, 'd':-0.50, 'f':-0.37, 'g':-0.24, 'h':-0.11, 'j':0.02, 'k':0.15, 'l':0.28, ';':0.41, ':':0.54, ']':0.67,
  'z':-0.70, 'x':-0.57, 'c':-0.44, 'v':-0.31, 'b':-0.18, 'n':-0.05, 'm':0.08, ',':0.21, '.':0.34, '/':0.47, '_':0.60,
  ' ': 0.00
};

function getKeyPan(key) {
  if (!key) return 0;
  if (surfaceKeyPanMap[key] !== undefined) return surfaceKeyPanMap[key];
  const upper = key.toUpperCase();
  if (surfaceKeyPanMap[upper] !== undefined) return surfaceKeyPanMap[upper];
  return (Math.random() * 2 - 1) * 0.15;
}

function unlockAudio() {
  if (audioCtx.state === 'suspended') { audioCtx.resume(); }
}
window.addEventListener('click', unlockAudio);
window.addEventListener('touchstart', unlockAudio);
window.addEventListener('keydown', unlockAudio);

function clack(type, keyName = '') {
  unlockAudio();
  const now = audioCtx.currentTime;

  const panner = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
  const targetPan = (type === 'space') ? 0.0 : (type === 'check' ? -0.65 : getKeyPan(keyName));
  
  if (panner) { panner.pan.setValueAtTime(targetPan, now); }

  // 筐体の金属共振フィルタ。Q値を高めにしてアナログ特有の耳障りな共鳴をあえて残す
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(type === 'add' ? 1200 : 900 + (Math.random() * 300), now);
  filter.Q.setValueAtTime(type === 'add' ? 0.8 : 2.5, now);

  if (panner) { filter.connect(panner); panner.connect(audioCtx.destination); }
  else { filter.connect(audioCtx.destination); }

  function strikeMetal(baseFreq, volume, noiseMix, duration) {
    const jitter = (Math.random() * 2 - 1) * 40;
    const freq = baseFreq + jitter;
    const dynVol = volume * (0.8 + Math.random() * 0.4);

    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.type = 'triangle';
    osc1.frequency.setValueAtTime(freq * 1.8, now);
    osc1.frequency.exponentialRampToValueAtTime(freq * 0.5, now + duration);
    gain1.gain.setValueAtTime(dynVol, now);
    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.015);

    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(freq * 0.8, now);
    gain2.gain.setValueAtTime(dynVol * 0.4, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + duration);

    const noise = audioCtx.createBufferSource();
    const noiseGain = audioCtx.createGain();
    noise.buffer = noiseBuffer;
    noiseGain.gain.setValueAtTime(dynVol * noiseMix, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.7);

    osc1.connect(gain1); gain1.connect(filter);
    osc2.connect(gain2); gain2.connect(filter);
    noise.connect(noiseGain); noiseGain.connect(filter);

    osc1.start(now); osc1.stop(now + duration + 0.02);
    osc2.start(now); osc2.stop(now + duration + 0.02);
    noise.start(now); noise.stop(now + duration + 0.02);
  }

  switch (type) {
    case 'type': 
      strikeMetal(320, 0.45, 3.8, 0.06);
      break;
    case 'space': 
      strikeMetal(180, 0.55, 2.5, 0.10);
      break;
    case 'add': 
      // チンッ！と空間に抜ける改行ベル
      const bellOsc = audioCtx.createOscillator();
      const bellGain = audioCtx.createGain();
      bellOsc.type = 'sine';
      bellOsc.frequency.setValueAtTime(2100, now); 
      bellGain.gain.setValueAtTime(0.35, now);
      bellGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      bellOsc.connect(bellGain); bellGain.connect(audioCtx.destination);
      bellOsc.start(now); bellOsc.stop(now + 0.2);

      strikeMetal(140, 0.60, 4.5, 0.18);
      break;
    case 'delete': 
      strikeMetal(220, 0.40, 3.0, 0.08);
      break;
    case 'check': 
      strikeMetal(480, 0.42, 1.5, 0.05);
      break;
  }
}

// 昨日のやり残しを未練がましく今日の紙に糊付けする処理
function shiftLeftovers(todayKey) {
  const all = uncoverArchive();
  const keys = Object.keys(all).sort();
  const prevKey = keys.filter(k => k < todayKey).pop();
  if (!prevKey) return;
  const prev = all[prevKey];
  const today = all[todayKey] || { glyphs: [] };
  if (today.carriedOver) return;
  const undone = (prev.glyphs || []).filter(it => it.type === 'task' && !it.checked);
  today.carriedOver = true;
  if (undone.length > 0) {
    const carried = undone.map(it => ({ ...it, id: uid(), carriedFrom: prevKey, checked: false }));
    today.glyphs = [...carried, ...(today.glyphs || [])];
  }
  writeScroll(todayKey, today);
}

function inkDensity() {
  const tasks = scroll.glyphs.filter(it => it.type === 'task');
  const done  = tasks.filter(it => it.checked).length;
  const total = tasks.length;
  const bar   = document.getElementById('progress-bar');
  const label = document.getElementById('progress-label');
  if (total === 0) {
    bar.style.width = '0%';
    bar.classList.remove('complete');
    label.classList.remove('visible');
    return;
  }
  const pct = Math.round(done / total * 100);
  bar.style.width = pct + '%';
  bar.classList.toggle('complete', pct === 100);
  label.textContent = `${done} / ${total}`;
  label.classList.add('visible');
  clearTimeout(label._timer);
  label._timer = setTimeout(() => label.classList.remove('visible'), 2400);
}

function parseType(text) {
  if (text.startsWith('# ') || text === '#') return 'heading';
  if (text.startsWith('- ') || text === '-') return 'memo';
  return 'task';
}
function cleanGlyphText(text, type) {
  if (type === 'heading') return text.replace(/^#\s*/, '');
  if (type === 'memo')    return text.replace(/^-\s*/, '');
  return text;
}
function formatRawGlyph(display, type) {
  if (type === 'heading') return '# ' + display;
  if (type === 'memo')    return '- ' + display;
  return display;
}

function flipTo(key) {
  activeDate = key;
  document.getElementById('date-label').textContent = activeDate;
  scroll = readScroll(activeDate);
  printGlyphs();
  closeCalendar();
}

function scratchOut(idx) {
  scrapPaper = { index: idx, data: scroll.glyphs[idx] };
  scroll.glyphs.splice(idx, 1);
  writeScroll(activeDate, scroll);
  printGlyphs();
  clack('delete', 'Backspace');
  showToast('項目を削除しました', true);
  
  const els = document.querySelectorAll('.line-ink');
  if (els.length > 0) {
    const t = els[Math.max(0, idx - 1)]; t.focus();
    window.getSelection().selectAllChildren(t); window.getSelection().collapseToEnd();
  } else { dipNib(); }
}

function rescueScrap() {
  if (!scrapPaper) return;
  scroll.glyphs.splice(scrapPaper.index, 0, scrapPaper.data);
  writeScroll(activeDate, scroll);
  printGlyphs();
  clack('delete', 'Backspace');
  const els = document.querySelectorAll('.line-ink');
  if (els[scrapPaper.index]) els[scrapPaper.index].focus();
  scrapPaper = null;
  hideToast();
}

function printGlyphs() {
  const ul = document.getElementById('paper-lines');
  ul.innerHTML = '';
  scroll.glyphs.forEach((item, idx) => {
    const li = document.createElement('li');
    li.className = 'paper-line'
      + (item.type === 'heading' ? ' type-heading' : item.type === 'memo' ? ' type-memo' : '')
      + (item.checked ? ' done' : '');
    li.dataset.idx = idx;

    const handle = document.createElement('div');
    handle.className = 'drag-handle';
    handle.innerHTML = '<span></span><span></span><span></span>';
    li.appendChild(handle);

    if (item.type === 'task') {
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'checkbox'; cb.checked = item.checked;
      cb.addEventListener('change', () => {
        clack('check');
        scroll.glyphs[idx].checked = cb.checked;
        writeScroll(activeDate, scroll);
        li.classList.toggle('done', cb.checked);
        inkDensity();
      });
      li.appendChild(cb);
    }

    const span = document.createElement('div');
    span.className = 'line-ink';
    span.contentEditable = 'true';
    span.spellcheck = false;
    span.textContent = cleanGlyphText(item.text, item.type);

    span.addEventListener('input', () => {
      let currentText = span.textContent;
      let newType = item.type;
      if (currentText.startsWith('# ')) { newType = 'heading'; }
      else if (currentText.startsWith('- ')) { newType = 'memo'; }
      else if (item.type !== 'task' && !currentText.startsWith('# ') && !currentText.startsWith('- ')) { newType = 'task'; }

      scroll.glyphs[idx].type = newType;
      scroll.glyphs[idx].text = formatRawGlyph(currentText, newType);
      writeScroll(activeDate, scroll);

      li.className = 'paper-line' + (newType === 'heading' ? ' type-heading' : newType === 'memo' ? ' type-memo' : '') + (item.checked ? ' done' : '');
      const hasCb = li.querySelector('.checkbox');
      if (newType === 'task' && !hasCb) { printGlyphs(); span.focus(); }
      else if (newType !== 'task' && hasCb) { hasCb.remove(); }
      inkDensity();
    });
    
    span.addEventListener('keydown', e => {
      const els = document.querySelectorAll('.line-ink');

      if (e.key === 'Backspace') {
        if (span.textContent.length > 0) {
          clack('delete', 'Backspace');
        } else if (span.textContent === '') {
          e.preventDefault();
          scratchOut(idx);
        }
      } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
        if (e.key === ' ') { clack('space', ' '); }
        else { clack('type', e.key); }
      }

      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (idx + 1 < els.length) { els[idx+1].focus(); } else { dipNib(); }
      }

      if (e.key === 'ArrowDown' && !e.shiftKey && !e.ctrlKey) {
        e.preventDefault();
        if (idx + 1 < els.length) els[idx+1].focus(); else dipNib();
      }
      if (e.key === 'ArrowUp' && !e.shiftKey && !e.ctrlKey) {
        e.preventDefault();
        if (idx - 1 >= 0) els[idx-1].focus();
      }

      if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && e.shiftKey && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        const targetIdx = e.key === 'ArrowDown' ? idx + 1 : idx - 1;
        if (targetIdx >= 0 && targetIdx < scroll.glyphs.length) {
          const moved = scroll.glyphs.splice(idx, 1)[0];
          scroll.glyphs.splice(targetIdx, 0, moved);
          writeScroll(activeDate, scroll); printGlyphs();
          document.querySelectorAll('.line-ink')[targetIdx].focus();
        }
      }

      if (e.key === 'e' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        if (item.type === 'task') {
          item.checked = !item.checked;
          writeScroll(activeDate, scroll); printGlyphs();
          clack('check');
          document.querySelectorAll('.line-ink')[idx].focus();
        }
      }
    });
    li.appendChild(span);

    if (item.carriedFrom) {
      const b = document.createElement('span');
      b.className = 'carry-badge'; b.textContent = '引き継ぎ';
      li.appendChild(b);
    }

    li.draggable = true;
    li.addEventListener('dragstart', e => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(idx));
      setTimeout(() => li.classList.add('weightless'), 0);
    });
    li.addEventListener('dragend', () => {
      li.classList.remove('weightless');
      document.querySelectorAll('.crease').forEach(el => el.classList.remove('crease'));
    });
    li.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (!li.classList.contains('weightless')) {
        document.querySelectorAll('.crease').forEach(el => el.classList.remove('crease'));
        li.classList.add('crease');
      }
    });
    li.addEventListener('dragleave', () => li.classList.remove('crease'));
    li.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation();
      const fromIndexStr = e.dataTransfer.getData('text/plain');
      if (fromIndexStr === '') return;
      const from = parseInt(fromIndexStr, 10);
      if (isNaN(from) || from === idx) return;
      const moved = scroll.glyphs.splice(from, 1)[0];
      scroll.glyphs.splice(idx, 0, moved);
      writeScroll(activeDate, scroll); printGlyphs(); inkDensity();
    });

    let touchStartY = 0;
    handle.addEventListener('touchstart', e => {
      touchStartY = e.touches[0].clientY;
      li.classList.add('weightless');
    }, {passive: true});

    handle.addEventListener('touchmove', e => {
      e.preventDefault();
      const touchY = e.touches[0].clientY;
      const targetEl = document.elementFromPoint(e.touches[0].clientX, touchY);
      const closestLi = targetEl ? targetEl.closest('.paper-line') : null;
      document.querySelectorAll('.crease').forEach(el => el.classList.remove('crease'));
      if (closestLi && closestLi !== li) { closestLi.classList.add('crease'); }
    }, {passive: false});

    handle.addEventListener('touchend', e => {
      li.classList.remove('weightless');
      const endY = e.changedTouches[0].clientY;
      const targetEl = document.elementFromPoint(e.changedTouches[0].clientX, endY);
      const closestLi = targetEl ? targetEl.closest('.paper-line') : null;
      document.querySelectorAll('.crease').forEach(el => el.classList.remove('crease'));
      if (closestLi && closestLi !== li) {
        const toIdx = parseInt(closestLi.dataset.idx);
        const moved = scroll.glyphs.splice(idx, 1)[0];
        scroll.glyphs.splice(toIdx, 0, moved);
        writeScroll(activeDate, scroll); printGlyphs(); inkDensity();
      }
    });

    ul.appendChild(li);
  });
  inkDensity();
}

const ink = document.getElementById('feed-well');

function dipNib() {
  ink.focus();
  setTimeout(() => ink.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

ink.addEventListener('keydown', e => {
  if (e.key === 'Backspace') {
    if (ink.value.length > 0) {
      clack('delete', 'Backspace');
    } else if (ink.value === '' && scroll.glyphs.length > 0) {
      e.preventDefault();
      clack('delete', 'Backspace');
      const els = document.querySelectorAll('.line-ink');
      if (els.length > 0) {
        const last = els[els.length-1]; last.focus();
        const r = document.createRange(); const s = window.getSelection();
        r.selectNodeContents(last); r.collapse(false);
        s.removeAllRanges(); s.addRange(r);
      }
    }
  } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
    if (e.key === ' ') { clack('space', ' '); }
    else { clack('type', e.key); }
  }

  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const raw = ink.value.trim();
    if (!raw) return;
    scroll.glyphs.push({ id: uid(), type: parseType(raw), text: raw, checked: false });
    writeScroll(activeDate, scroll);
    ink.value = '';
    printGlyphs();
    clack('add', 'Enter');
  }

  if (e.key === 'ArrowUp' && ink.value === '') {
    const els = document.querySelectorAll('.line-ink');
    if (els.length > 0) els[els.length-1].focus();
  }
});

window.addEventListener('keydown', e => {
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
    if (document.activeElement.id !== 'feed-well' && document.activeElement.tagName !== 'INPUT') {
      if (scrapPaper) { e.preventDefault(); rescueScrap(); }
    }
  }
});

let hintShown = false;
ink.addEventListener('input', () => {
  if (!hintShown && ink.value.length > 0) {
    hintShown = true;
    document.getElementById('hint').classList.add('visible');
    setTimeout(() => document.getElementById('hint').classList.remove('visible'), 4000);
  }
});

document.getElementById('page').addEventListener('click', e => {
  if (e.target === document.getElementById('page') ||
      e.target === document.getElementById('paper-lines') ||
      e.target === document.getElementById('feed-line')) {
    dipNib();
  }
});

// カレンダー開閉用の切り出し
let calDate = new Date();
const dateLabel = document.getElementById('date-label');
const picker = document.getElementById('calendar-picker');

function openCalendar() { picker.classList.add('open'); renderCalendar(); }
function closeCalendar() { picker.classList.remove('open'); }

dateLabel.addEventListener('click', e => { e.stopPropagation(); picker.classList.contains('open') ? closeCalendar() : openCalendar(); });
document.addEventListener('click', e => { if (!picker.contains(e.target) && e.target !== dateLabel) closeCalendar(); });

document.getElementById('cal-prev-month').addEventListener('click', e => { e.stopPropagation(); calDate.setMonth(calDate.getMonth() - 1); renderCalendar(); });
document.getElementById('cal-next-month').addEventListener('click', e => { e.stopPropagation(); calDate.setMonth(calDate.getMonth() + 1); renderCalendar(); });
document.getElementById('btn-prev-day').addEventListener('click', () => { moveDay(-1); });
document.getElementById('btn-next-day').addEventListener('click', () => { moveDay(1); });

function moveDay(offset) {
  const parts = activeDate.split('.');
  const d = new Date(parts[0], parts[1]-1, parts[2]);
  d.setDate(d.getDate() + offset);
  flipTo(formatDateKey(d));
}

function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  const title = document.getElementById('cal-month-title');
  grid.innerHTML = '';
  
  title.textContent = `${calDate.getFullYear()}年 ${calDate.getMonth() + 1}月`;
  const labels = ['日','月','火','水','木','金','土'];
  labels.forEach(l => { const div = document.createElement('div'); div.className = 'cal-day-label'; div.textContent = l; grid.appendChild(div); });

  const firstDay = new Date(calDate.getFullYear(), calDate.getMonth(), 1).getDay();
  const numDays = new Date(calDate.getFullYear(), calDate.getMonth() + 1, 0).getDate();
  const allData = uncoverArchive();

  for(let i=0; i<firstDay; i++) { grid.appendChild(document.createElement('div')); }
  for(let day=1; day<=numDays; day++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell'; cell.textContent = day;
    const thisKey = `${calDate.getFullYear()}.${String(calDate.getMonth()+1).padStart(2,'0')}.${String(day).padStart(2,'0')}`;
    
    if (allData[thisKey] && allData[thisKey].glyphs && allData[thisKey].glyphs.length > 0) cell.classList.add('has-data');
    if (thisKey === activeDate) cell.classList.add('current');
    
    cell.addEventListener('click', e => { e.stopPropagation(); flipTo(thisKey); });
    grid.appendChild(cell);
  }
}

function showToast(msg, showUndo = false) {
  const t = document.getElementById('toast');
  document.getElementById('toast-text').textContent = msg;
  document.getElementById('toast-undo-btn').style.display = showUndo ? 'inline-block' : 'none';
  t.classList.add('show');
  clearTimeout(t._timer); t._timer = setTimeout(hideToast, 4000);
}
function hideToast() { document.getElementById('toast').classList.remove('show'); }
document.getElementById('toast-undo-btn').addEventListener('click', rescueScrap);

function openDrawer()  {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

document.getElementById('menu-btn').addEventListener('click', openDrawer);
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);

function downloadText(filename, content, mime) {
  const blob = new Blob([content], { type: mime + ';charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url; a.download = filename; a.style.display = 'none';
  document.body.appendChild(a); a.click();
  setTimeout(function() { URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
}

document.getElementById('btn-export-json').addEventListener('click', () => {
  closeDrawer();
  setTimeout(() => {
    const all = uncoverArchive();
    downloadText('jot_backup_' + activeDate.replace(/\./g, '') + '.json', JSON.stringify(all, null, 2), 'application/json');
    showToast('JSONをエクスポートしました');
  }, 300);
});

document.getElementById('btn-export-txt').addEventListener('click', () => {
  closeDrawer();
  setTimeout(() => {
    const all = uncoverArchive();
    const keys = Object.keys(all).sort().reverse();
    let text = '';
    keys.forEach(key => {
      const pg = all[key];
      text += '===== ' + key + ' =====\n';
      (pg.glyphs || []).forEach(it => {
        if (it.type === 'heading') text += '\n' + it.text.replace(/^#\s*/, '').toUpperCase() + '\n';
        else if (it.type === 'memo') text += '  ' + it.text.replace(/^-\s*/, '') + '\n';
        else text += (it.checked ? '☑' : '□') + ' ' + it.text + '\n';
      });
      text += '\n';
    });
    downloadText('jot_' + activeDate.replace(/\./g, '') + '.txt', text, 'text/plain');
    showToast('テキストをエクスポートしました');
  }, 300);
});

document.getElementById('btn-import').addEventListener('click', () => {
  closeDrawer();
  setTimeout(() => { document.getElementById('import-input').click(); }, 300);
});

document.getElementById('import-input').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (typeof data !== 'object' || Array.isArray(data) || data === null) throw new Error();
      const validKeys = Object.keys(data).filter(k => /^\d{4}\.\d{2}\.\d{2}$/.test(k));
      if (validKeys.length === 0) throw new Error();
      saveAll(Object.assign({}, uncoverArchive(), data));
      flipTo(activeDate);
      showToast('インポート完了 — ' + validKeys.length + ' 日分');
    } catch {
      showToast('読み込み失敗：正しいJSONファイルか確認してください');
    }
    this.value = '';
  };
  reader.readAsText(file);
});

// 静かな改ページ判定（深夜リロード処理）
function midnightRollover() {
  const now = new Date();
  const next = new Date(now);
  next.setDate(next.getDate() + 1); next.setHours(0, 0, 1, 0);
  setTimeout(() => location.reload(), next - now);
}

// 起動
const today = getTodayKey();
shiftLeftovers(today);
flipTo(today);
dipNib();
midnightRollover();

if (scroll.glyphs.some(it => it.carriedFrom)) {
  const n = scroll.glyphs.filter(it => it.carriedFrom).length;
  setTimeout(() => showToast(`昨日の未完了を ${n} 件引き継ぎました`), 600);
}
